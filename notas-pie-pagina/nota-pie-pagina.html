

<!doctype html>
<html lang="es">
  <head>

    <style>
      body{
        font-family: Helvetica, Arial, sans-serif;
        font-size:1.25em;
      }
      sup a:focus, sup a:hover, li a:focus, li a:hover {
        outline: 2px dashed #000;
        background-color: #d5f5e3;
        color: black;
        border-radius: 0.2em;
        padding: 0 0.2em;
      }
      li:target {
        background:  #d5f5e3;
        display: list-item;
        width: fit-content;

        padding-inline: 0.2em;
      }
    </style>
  </head>
  <body>

          <li id="nota1">Aquí el texto de la nota 1. <a href="#ref1" aria-label="Vuelve a la referencia 1" role="doc-backlink">↩ Vuelve a la referencia 1</a></li>
          <li id="nota2">Aquí el texto de la nota 1. <a href="#ref2" aria-label="Vuelve a la referencia 2" role="doc-backlink">↩ Vuelve a la referencia 2</a></li>

    </article>
