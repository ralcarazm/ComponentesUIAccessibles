<!doctype html>
<html lang="en">
<head>
<style>
table {
      border-collapse: collapse;
      width: 100%;
      max-width: 800px;
      margin: 1em auto;
      font-family: sans-serif;
    }

    caption {
      caption-side: top;
      font-weight: bold;
      font-size: 1.2em;
      margin-bottom: 0.5em;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 0.6em 1em;
      text-align: left;
    }

    thead tr {
      background-color: #004080;
      color: #ffffff;
    }

    tbody tr:nth-child(odd) {
      background-color: #f2f2f2;
    }

    tbody tr:hover {
      background-color: #d9ebff;
    }
    td:nth-child(3) {
      text-align: right;
    }


</style>
</head>
<body>
<table>
  <caption>Top-selling video game consoles by platform, company, and units sold</caption>
  <thead>
    <tr>
      <th scope="col">Platform</th>
      <th scope="col">Company</th>
      <th scope="col">Units sold</th>
    </tr>
   </thead>
  <tbody>
    <tr>
      <th scope="row">PlayStation 2</th>
      <td>Sony</td>
      <td>160.630.000</td>
    </tr>
    <tr>
      <th scope="row">Nintendo DS</th>
      <td>Nintendo</td>
      <td>154.020.000</td>
    </tr>
    <tr>
      <th scope="row">Nintendo Switch</th>
      <td>Nintendo</td>
      <td>152.120.000</td>
    </tr>
    <tr>
      <th scope="row">Game Boy + Game Boy Color</th>
      <td>Nintendo</td>
      <td>118.690.000</td>
    </tr>
    <tr>
      <th scope="row">PlayStation 4</th>
      <td>Sony</td>
      <td>117.200.000</td>
    </tr>
   </tbody>
</table>
</body>
